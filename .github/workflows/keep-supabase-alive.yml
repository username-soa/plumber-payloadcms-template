name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at midnight UTC
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase PostgreSQL
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
        run: |
          echo "Pinging Supabase database to prevent pausing..."
          psql "$DATABASE_URI" -c "SELECT 1;" && echo "✅ Database is alive!" || echo "❌ Failed to ping database"
